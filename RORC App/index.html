<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#262626" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="RORC App" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>RORC App</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <section id="authGate" class="auth-gate" aria-live="polite">
      <div class="auth-card">
        <img class="auth-logo" src="../Images/LOGOS/LOGO.png" alt="RORC" />
        <p class="auth-eyebrow">Member Access</p>
        <h1>Sign In</h1>
        <p class="auth-copy">Use the same account as your RORC website dashboard.</p>

        <label>
          <span>Email Address</span>
          <input id="appLoginEmail" type="email" autocomplete="email" inputmode="email" />
        </label>

        <label>
          <span>Password</span>
          <input id="appLoginPassword" type="password" autocomplete="current-password" />
        </label>

        <div class="auth-actions">
          <button id="appLoginButton" type="button">Log In</button>
          <button id="appMagicLinkButton" class="auth-secondary" type="button">Email Login Link</button>
        </div>

        <button id="appResetPasswordButton" class="auth-link-button" type="button">Reset password</button>
        <p id="appAuthMessage" class="auth-message">Checking your login...</p>
        <a class="auth-dashboard-link" href="/member-dashboard/">Back to dashboard</a>
      </div>
    </section>

    <div id="drawerOverlay" class="drawer-overlay" hidden></div>
    <aside id="appDrawer" class="app-drawer" aria-hidden="true" aria-label="Main menu">
      <div class="drawer-header">
        <img class="drawer-logo" src="../Images/LOGOS/LOGO.png" alt="RORC" />
        <strong>Ruth Obenchain RC</strong>
      </div>
      <nav class="drawer-nav" aria-label="Menu pages">
        <button class="drawer-item" data-route="accountInfo" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 21a8 8 0 0 1 16 0"></path>
          </svg>
          <span>Account Administration</span>
        </button>
        <button class="drawer-item" data-route="myAccount" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 21a8 8 0 0 1 16 0"></path>
          </svg>
          <span>My Account</span>
        </button>
        <button class="drawer-item" data-route="notifications" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span>Notifications <b id="drawerNotificationsBadge" class="drawer-notification-badge" hidden>New</b></span>
        </button>
        <button class="drawer-item" data-route="otherUsers" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 20v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M22 20v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span>Other Users On My Account</span>
        </button>
        <button class="drawer-item" data-route="feedback" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z"></path>
            <path d="M8 9h8"></path>
            <path d="M8 13h5"></path>
          </svg>
          <span>Feedback</span>
        </button>
        <button class="drawer-item" data-route="message" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="8" width="16" height="11" rx="3"></rect>
            <path d="M12 4v4"></path>
            <path d="M9 13h.01"></path>
            <path d="M15 13h.01"></path>
            <path d="M8 16h8"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
          </svg>
          <span>Bot Settings</span>
        </button>
        <button class="drawer-item" data-route="notificationsEmail" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6h16v12H4z"></path>
            <path d="m4 8 8 6 8-6"></path>
          </svg>
          <span>Notifications &amp; Email</span>
        </button>
        <button class="drawer-item" data-route="contracts" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 3h9l3 3v15H6z"></path>
            <path d="M14 3v4h4"></path>
            <path d="M9 12h6"></path>
            <path d="M9 16h6"></path>
          </svg>
          <span>Account Reviews <b id="drawerContractReviewsBadge" class="drawer-notification-badge" hidden>Review</b></span>
        </button>
        <button class="drawer-item" data-route="rentalReviews" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <path d="M16 2v4"></path>
            <path d="M8 2v4"></path>
            <path d="M3 10h18"></path>
            <path d="M8 14h.01"></path>
            <path d="M12 14h4"></path>
            <path d="M8 17h.01"></path>
            <path d="M12 17h4"></path>
          </svg>
          <span>Rentals <b id="drawerRentalReviewsBadge" class="drawer-notification-badge" hidden></b></span>
        </button>
        <button class="drawer-item" data-route="calendar" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <path d="M16 2v4"></path>
            <path d="M8 2v4"></path>
            <path d="M3 10h18"></path>
          </svg>
          <span>Calendar</span>
        </button>
        <button class="drawer-item" data-route="adminNotes" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 11h8"></path>
            <path d="M9 15h8"></path>
            <path d="M9 7h8"></path>
            <path d="M5 4h14v16H5z"></path>
            <path d="m5 8 3-3"></path>
          </svg>
          <span>Admin Notes</span>
        </button>
        <button class="drawer-item" data-route="masterLogs" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 5h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 19h16"></path>
          </svg>
          <span>Master Logs</span>
        </button>
        <div class="drawer-divider" role="separator"></div>
        <button class="drawer-item" data-route="about" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 16v-4"></path>
            <path d="M12 8h.01"></path>
          </svg>
          <span>About</span>
        </button>
        <button class="drawer-item" data-route="share" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <path d="m8.6 10.5 6.8-4"></path>
            <path d="m8.6 13.5 6.8 4"></path>
          </svg>
          <span>Share</span>
        </button>
      </nav>
      <div class="drawer-footer">
        <span id="drawerAvatar" class="drawer-avatar">?</span>
        <span id="drawerUserEmail"></span>
        <button id="appLogoutButton" class="drawer-logout" type="button">Sign Out</button>
      </div>
    </aside>

    <div class="app-shell" hidden>
      <header class="app-bar">
        <div class="app-title-group">
          <button id="navControl" class="icon-btn" type="button" aria-label="Open menu" aria-controls="appDrawer" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <img class="app-logo" src="../Images/LOGOS/LOGO.png" alt="RORC" />
          <h1 id="screenTitle">Currently Signed In</h1>
        </div>
      </header>

      <main id="view" class="view" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="Primary">
        <button class="nav-item" data-route="memberSignIn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 20v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <path d="M19 8v6"></path>
            <path d="M22 11h-6"></path>
          </svg>
          <span>Member Sign In</span>
        </button>
        <button class="nav-item" data-route="guestSignIn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M19 8v6"></path>
            <path d="M22 11h-6"></path>
            <path d="M19 18h.01"></path>
          </svg>
          <span>Guest Sign In</span>
        </button>
        <button class="nav-item is-active" data-route="currentlySignedIn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span>Currently Signed In</span>
        </button>
        <button class="nav-item" data-route="heaterRecords" type="button">
          <svg class="flame-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12.4 2.4c.4 4.4-3.8 6.3-6.2 9.8-2.2 3.2-1.5 7.5 2.1 9.4-1-3.8 1.2-6.6 3.9-8.7 2.4 2.2 3.8 4.9 2.7 8.7 3.4-1.5 5.3-4.4 4.7-7.9-.4-2.3-1.8-4.1-3.4-5.8.3 2-.5 3.7-2 5 .6-3.8-.7-7.1-1.8-10.5Z"></path>
          </svg>
          <span>Thermostat</span>
        </button>
      </nav>
    </div>

    <template id="currentlySignedInTemplate">
      <section id="currentlySignedInContent" class="currently-signed-in-page"></section>
    </template>

    <template id="memberSignInTemplate">
      <form class="form-screen member-sign-in-screen">
        <div class="form-card">
          <label>
            <span>Name<mark>*</mark></span>
            <input id="memberNameSelect" class="member-picker-value" type="hidden" required />
            <button
              id="memberNamePicker"
              class="member-picker-button multi-member-picker-button"
              data-member-multi-picker="memberNameSelect"
              data-member-picker-source="memberSignIn"
              data-member-picker-placeholder="Select members"
              data-member-picker-title="Name"
              type="button"
            >
              <span class="member-picker-selected">
                <span class="member-picker-placeholder">Select members</span>
              </span>
              <span class="member-picker-plus" aria-hidden="true">+</span>
            </button>
          </label>
          <label>
            <span>Date/Time In</span>
            <input id="dateTimeIn" type="text" readonly />
          </label>
        </div>
        <div class="form-actions">
          <button class="text-action" data-route-target="currentlySignedIn" type="button">Cancel</button>
          <button class="save-action" type="button">Save</button>
        </div>
      </form>
    </template>

    <template id="guestSignInTemplate">
      <form class="form-screen guest-sign-in-screen">
        <div class="form-card">
          <label>
            <span>Guest Name</span>
            <input id="guestNameInput" type="text" list="recentGuestNames" />
            <datalist id="recentGuestNames"></datalist>
            <div id="recentGuestWindowList" class="recent-guest-window-list" hidden></div>
          </label>
          <label>
            <span>Member Entered With: Day Pass guest permission applies outside Open Gym. Open Gym guests may enter with any eligible member during Open Gym.</span>
            <input id="guestMemberSelect" class="member-picker-value" type="hidden" />
            <button
              id="guestMemberPicker"
              class="member-picker-button"
              data-member-picker="guestMemberSelect"
              data-member-picker-source="guestSponsors"
              data-member-picker-title="Member Entered With"
              type="button"
            >
              <span class="member-picker-selected">
                <span class="member-picker-placeholder">Select member</span>
              </span>
              <span class="member-picker-caret" aria-hidden="true"></span>
            </button>
          </label>
          <div class="segmented-field">
            <p>Day Pass: Select to bring in a guest outside Open Gym. First 10 guest days per account each month are free, then $0.25 per guest day billed monthly. The same guest can be reused for 24 hours under the same account.</p>
            <p>Open Gym: Select to bring a guest into open gym nights FREE.</p>
            <div class="segmented-control" role="group" aria-label="Guest pass type">
              <button class="segment" type="button">Day Pass</button>
              <button class="segment" type="button">Open Gym</button>
            </div>
            <div id="openGymWarning" class="availability-warning" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 7v6"></path>
                <path d="M12 17h.01"></path>
              </svg>
              <p><strong>NOT AVAILABLE</strong> Open gym is Tuesday & Thursday nights 6pm to 8pm. A day pass must be purchased for your guest by selecting DAY PASS.</p>
            </div>
          </div>
          <div class="segmented-field">
            <span>Liability Accepted</span>
            <div class="segmented-control" role="group" aria-label="Liability accepted">
              <button class="segment" type="button">N</button>
              <button class="segment" type="button">Y</button>
            </div>
          </div>
          <label>
            <span>Date/Time In</span>
            <input id="guestDateTimeIn" type="text" readonly />
          </label>
        </div>
        <div class="form-actions">
          <button class="text-action" data-route-target="currentlySignedIn" type="button">Cancel</button>
          <button class="save-action" type="button">Save</button>
        </div>
      </form>
    </template>

    <template id="heaterRecordsTemplate">
      <section class="heater-records-page">
        <div id="heaterRecordsContent" class="heater-records-content"></div>
        <div id="heaterConfirm" class="confirm-overlay" hidden>
          <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="heaterConfirmTitle">
            <h2 id="heaterConfirmTitle">Confirm</h2>
            <p>Confirm Thermostat<br /><span>Select Heat or AC to continue.</span></p>
            <div class="confirm-thermostat-system" data-confirm-thermostat-system>
              <button data-confirm-system="heat" type="button">Heat</button>
              <button data-confirm-system="ac" type="button">AC</button>
            </div>
            <div class="confirm-actions">
              <button data-heater-confirm-close type="button">NO</button>
              <button data-heater-confirm-accept type="button">CONFIRM</button>
            </div>
          </div>
        </div>
      </section>
    </template>

    <template id="heaterFormTemplate">
      <form class="form-screen heater-use-screen">
        <input id="thermostatSystemValue" type="hidden" value="heat" />
        <div class="form-card heater-form-card">
          <div class="segmented-field thermostat-system-field" hidden>
            <span>Thermostat System<mark>*</mark></span>
            <div class="segmented-control" role="group" aria-label="Thermostat system">
              <button class="segment icon-segment" data-thermostat-system="heat" type="button">
                <svg class="flame-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12.4 2.4c.4 4.4-3.8 6.3-6.2 9.8-2.2 3.2-1.5 7.5 2.1 9.4-1-3.8 1.2-6.6 3.9-8.7 2.4 2.2 3.8 4.9 2.7 8.7 3.4-1.5 5.3-4.4 4.7-7.9-.4-2.3-1.8-4.1-3.4-5.8.3 2-.5 3.7-2 5 .6-3.8-.7-7.1-1.8-10.5Z"></path>
                </svg>
                Heat
              </button>
              <button class="segment" data-thermostat-system="ac" type="button">AC</button>
            </div>
          </div>
          <div class="segmented-field thermostat-state-field" hidden>
            <span>Turn Thermostat On</span>
            <div class="segmented-control" role="group" aria-label="Turn thermostat on">
              <button class="segment" type="button">On</button>
              <button class="segment" type="button">Off</button>
            </div>
          </div>
          <label id="thermostatTargetTempField">
            <span>Desired Temperature<mark>*</mark></span>
            <select id="thermostatTargetTemp">
              <option value="45">45°F</option>
              <option value="50">50°F</option>
              <option value="55">55°F</option>
              <option value="60">60°F</option>
              <option value="62">62°F</option>
              <option value="64">64°F</option>
              <option value="66">66°F</option>
              <option value="68">68°F</option>
              <option value="70">70°F</option>
              <option value="72">72°F</option>
              <option value="74">74°F</option>
              <option value="76">76°F</option>
              <option value="78">78°F</option>
              <option value="80">80°F</option>
            </select>
          </label>
          <div class="segmented-field thermostat-cost-ack">
            <p id="thermostatCostCopy">Heat costs $13 per hour and is billed monthly.<mark>*</mark></p>
            <div class="segmented-control" role="group" aria-label="Thermostat cost accepted">
              <button class="segment" data-thermostat-cost-accepted="Y" type="button">Accept</button>
              <button class="segment" data-thermostat-cost-accepted="N" type="button">No</button>
            </div>
          </div>
          <div class="segmented-field">
            <p>Group Pay?<br>No: Standard use billed monthly<br>Yes: Only used when a bill needs to be divided between parties for a single event<mark>*</mark></p>
            <div class="segmented-control" role="group" aria-label="Group pay">
              <button class="segment" data-heater-group-pay="N" type="button">N</button>
              <button class="segment" data-heater-group-pay="Y" type="button">Y</button>
            </div>
          </div>
          <div class="segmented-field">
            <span>Add Timer?</span>
            <div class="segmented-control" role="group" aria-label="Add timer">
              <button class="segment" data-heater-timer-enabled="N" type="button">No</button>
              <button class="segment" data-heater-timer-enabled="Y" type="button">Yes</button>
            </div>
          </div>
          <div id="heaterTimerOptionsField" class="segmented-field" hidden>
            <span>Timer Type</span>
            <div class="segmented-control" role="group" aria-label="Timer type">
              <button class="segment" data-heater-timer-mode="duration" type="button">Timer Length</button>
              <button class="segment" data-heater-timer-mode="until" type="button">Turn Off At Time</button>
            </div>
            <label id="heaterTimerDurationField">
              <span>Timer Length</span>
              <select id="heaterTimerDuration">
                <option value="15">15 minutes</option>
                <option value="30">30 minutes</option>
                <option value="45">45 minutes</option>
                <option value="60">1 hour</option>
                <option value="75">1 hour 15 minutes</option>
                <option value="90">1 hour 30 minutes</option>
                <option value="105">1 hour 45 minutes</option>
                <option value="120">2 hours</option>
                <option value="135">2 hours 15 minutes</option>
                <option value="150">2 hours 30 minutes</option>
                <option value="165">2 hours 45 minutes</option>
                <option value="180">3 hours</option>
                <option value="195">3 hours 15 minutes</option>
                <option value="210">3 hours 30 minutes</option>
                <option value="225">3 hours 45 minutes</option>
                <option value="240">4 hours</option>
                <option value="255">4 hours 15 minutes</option>
                <option value="270">4 hours 30 minutes</option>
                <option value="285">4 hours 45 minutes</option>
                <option value="300">5 hours</option>
              </select>
            </label>
            <label id="heaterTimerUntilField" hidden>
              <span>Turn Off At</span>
              <input id="heaterTimerUntil" type="time" />
            </label>
          </div>
          <div id="heaterResponsiblePartyField" class="segmented-field heater-responsible-field" hidden>
            <span>Responsible Party<mark>*</mark></span>
            <input id="heaterResponsibleMember" class="member-picker-value" type="hidden" />
            <button
              id="heaterResponsibleMemberPicker"
              class="member-picker-button"
              data-member-picker="heaterResponsibleMember"
              data-member-picker-source="heaterResponsible"
              data-member-picker-title="Responsible Party"
              type="button"
            >
              <span class="member-picker-selected">
                <span class="member-picker-placeholder">Select responsible party</span>
              </span>
              <span class="member-picker-caret" aria-hidden="true"></span>
            </button>
            <label class="heater-pin-field">
              <span>Thermostat PIN<mark>*</mark></span>
              <input id="heaterPin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" minlength="4" autocomplete="new-password" />
            </label>
          </div>
          <div id="heaterResponsiblePartiesField" class="segmented-field heater-responsible-field" hidden>
            <span>Responsible Parties<mark>*</mark></span>
            <input id="heaterResponsibleMembers" class="member-picker-value" type="hidden" />
            <button
              id="heaterResponsibleMembersPicker"
              class="member-picker-button multi-member-picker-button"
              data-member-multi-picker="heaterResponsibleMembers"
              data-member-picker-source="heaterResponsible"
              data-member-picker-placeholder="Select responsible parties"
              data-member-picker-title="Responsible Parties"
              type="button"
            >
              <span class="member-picker-selected">
                <span class="member-picker-placeholder">Select responsible parties</span>
              </span>
              <span class="member-picker-plus" aria-hidden="true">+</span>
            </button>
          </div>
          <label>
            <span>Note for the record?</span>
            <textarea rows="3"></textarea>
          </label>
          <label>
            <span>Date<mark>*</mark></span>
            <input id="heaterDate" type="text" readonly />
          </label>
        </div>
        <div class="form-actions">
          <button class="text-action" data-route-target="heaterRecords" type="button">Cancel</button>
          <button class="save-action" type="button">Save</button>
        </div>
      </form>
    </template>

    <template id="accountInfoTemplate">
      <section id="accountInfoContent" class="account-info-page"></section>
    </template>

    <template id="otherUsersTemplate">
      <section id="otherUsersContent" class="account-info-page"></section>
    </template>
