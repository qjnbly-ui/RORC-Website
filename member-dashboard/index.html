<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Member Dashboard | RORC</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="site-menu">
    <input type="checkbox" id="site-menu-toggle" class="site-menu-toggle" />
    <div class="site-menu-bar">
      <a class="site-menu-brand" href="/">RORC</a>
      <div class="site-menu-actions">
        <a class="site-menu-login" href="/membership-login/">Login</a>
        <label class="site-menu-button" for="site-menu-toggle">Menu</label>
      </div>
    </div>
    <label class="site-menu-backdrop" for="site-menu-toggle" aria-hidden="true"></label>
    <div class="site-menu-panel" role="dialog" aria-label="Site menu">
      <label class="site-menu-close" for="site-menu-toggle">Close</label>
      <div>
        <nav class="site-menu-links" aria-label="Site">
          <a href="/">Home</a>
          <a href="/about-rorc/">About</a>
          <a href="/memberships/">Memberships</a>
          <a href="/rentals/">Rentals</a>
          <a href="/sponsors/">Sponsors</a>
          <a href="/projects/">Projects</a>
          <a href="/news-updates/">News & Updates</a>
          <a href="/application/">RORC App</a>
        </nav>
      </div>
      <div class="site-menu-legal" aria-label="Legal">
        <a href="/support/">Support</a>
        <a href="/privacy-policy/">Privacy Policy</a>
        <a href="/terms-of-service/">Terms of Service</a>
      </div>
    </div>
  </div>

  <main class="page-content membership-page">
    <section class="membership-hero">
      <h1>Member Dashboard</h1>
    </section>

    <section class="rorc-card" style="max-width: 720px; margin: 0 auto;">
      <div id="memberDashboard" class="rorc-card-text">
        Loading member information...
      </div>
      <div class="rorc-actions">
        <button id="billingBtn" class="rorc-btn rorc-btn-neutral">
          Manage Billing
        </button>
        <button id="openAccountInfoBtn" class="rorc-btn rorc-btn-neutral">
          Account Info
        </button>
        <button id="openUpdatePasswordBtn" class="rorc-btn rorc-btn-neutral">
          Update Password
        </button>
      </div>
    </section>
  </main>

  <div id="updatePasswordModal" class="rorc-password-modal" hidden>
    <div class="rorc-password-backdrop" data-close></div>
    <div class="rorc-password-dialog" role="dialog" aria-modal="true" aria-labelledby="updatePasswordTitle">
      <button type="button" class="rorc-password-close" data-close>Close</button>
      <h2 id="updatePasswordTitle" class="rorc-card-title">Update Password</h2>

      <div class="rorc-password-form">
        <label class="rorc-auth-label">
          <span>Current PIN</span>
          <input id="currentPin" class="rorc-auth-input" type="password" maxlength="4" inputmode="numeric" />
        </label>

        <label class="rorc-auth-label">
          <span>New PIN</span>
          <input id="newPin" class="rorc-auth-input" type="password" maxlength="4" inputmode="numeric" />
        </label>

        <label class="rorc-auth-label">
          <span>Confirm New PIN</span>
          <input id="confirmPin" class="rorc-auth-input" type="password" maxlength="4" inputmode="numeric" />
        </label>

        <div class="rorc-actions" style="justify-content:flex-start;">
          <button id="updatePasswordBtn" class="rorc-btn rorc-btn-neutral">
            Update Password
          </button>
        </div>

        <p id="passwordResult" class="rorc-card-text" style="min-height:1.5em;"></p>
      </div>
    </div>
  </div>

  <div id="accountInfoModal" class="rorc-password-modal" hidden>
    <div class="rorc-password-backdrop" data-close></div>
    <div class="rorc-password-dialog" role="dialog" aria-modal="true" aria-labelledby="accountInfoTitle">
      <button type="button" class="rorc-password-close" data-close>Close</button>
      <h2 id="accountInfoTitle" class="rorc-card-title">Account Information</h2>

      <div class="rorc-password-form">
        <label class="rorc-auth-label">
          <span>Phone Number</span>
          <input id="accountPhone" class="rorc-auth-input" type="text" inputmode="tel" />
        </label>

        <label class="rorc-auth-label">
          <span>Email Address</span>
          <input id="accountEmail" class="rorc-auth-input" type="email" inputmode="email" />
        </label>

        <div class="rorc-actions" style="justify-content:flex-start;">
          <button id="updateAccountBtn" class="rorc-btn rorc-btn-neutral">
            Update Account Info
          </button>
        </div>

        <p id="accountResult" class="rorc-card-text" style="min-height:1.5em;"></p>
      </div>
    </div>
  </div>
  <script>
  const memberData = JSON.parse(localStorage.getItem("memberData"));
  const container = document.getElementById("memberDashboard");
  const billingBtn = document.getElementById("billingBtn");

  if (!memberData) {
    container.innerHTML = `
      <p>Not logged in.</p>
      <p><a href="https://payments.ruthobenchainrc.com/p/login/eVaeWh2tN0vxgSs288" target="_blank" rel="noopener">Open Membership Portal</a></p>
    `;
    if (billingBtn) {
      billingBtn.style.display = "none";
    }
  } else {
    container.innerHTML = `
      <h3>Welcome, ${memberData["Member Name"]}</h3>

      <p><strong>Account Type:</strong> ${memberData["Account Type"] || ""}</p>
      <p><strong>Account Number:</strong> ${memberData["Account Number"] || ""}</p>
      <p><strong>Status:</strong> ${memberData["StripeStatus"] || ""}</p>
    `;
  }

  const accountPhone = document.getElementById("accountPhone");
  const accountEmail = document.getElementById("accountEmail");

  if (memberData && accountPhone && accountEmail) {
    accountPhone.value = memberData["Phone Number"] || "";
    accountEmail.value = (memberData["Email Address"] || "").trim();
  }

  const stripeCustomerId = memberData ? memberData["StripeCustomerID"] : "";

  if (billingBtn) {
    if (memberData && !stripeCustomerId) {
      billingBtn.textContent = "Open Membership Portal";
      billingBtn.addEventListener("click", () => {
        window.open("https://payments.ruthobenchainrc.com/p/login/eVaeWh2tN0vxgSs288", "_blank");
      });
    } else {
      billingBtn.addEventListener("click", async () => {
      try {
        const res = await fetch("/api/member-portal", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            member: memberData
          })
        });

        const data = await res.json();

        if (data.success && data.url) {
          window.location.href = data.url;
        } else {
          alert(data.error || "Could not open billing portal.");
        }
      } catch (err) {
        alert("Could not open billing portal.");
      }
    });
    }
  }

  const loginLink = document.querySelector(".site-menu-login");
  if (loginLink) {
    loginLink.textContent = "Logout";
    loginLink.setAttribute("href", "#");
    loginLink.addEventListener("click", (event) => {
      event.preventDefault();
      localStorage.removeItem("memberData");
      window.location.href = "/membership-login/";
    });
  }

  const openAccountInfoBtn = document.getElementById("openAccountInfoBtn");
  const accountInfoModal = document.getElementById("accountInfoModal");
  const updateAccountBtn = document.getElementById("updateAccountBtn");
  const accountResult = document.getElementById("accountResult");
  const updatePasswordModal = document.getElementById("updatePasswordModal");
  const openUpdatePasswordBtn = document.getElementById("openUpdatePasswordBtn");
  const updatePasswordBtn = document.getElementById("updatePasswordBtn");
  const passwordResult = document.getElementById("passwordResult");

  const closeAccountInfoModal = () => {
    if (!accountInfoModal) return;
    accountInfoModal.hidden = true;
  };

  const openAccountInfoModal = () => {
    if (!accountInfoModal) return;
    accountInfoModal.hidden = false;
    if (accountResult) {
      accountResult.textContent = "";
    }
    const phoneInput = document.getElementById("accountPhone");
    const emailInput = document.getElementById("accountEmail");
    if (phoneInput) {
      phoneInput.value = memberData ? String(memberData["Phone Number"] || "") : "";
    }
    if (emailInput) {
      emailInput.value = memberData ? String(memberData["Email Address"] || "") : "";
    }
    if (phoneInput) {
      phoneInput.focus();
    }
  };

  const closeUpdatePasswordModal = () => {
    if (!updatePasswordModal) return;
    updatePasswordModal.hidden = true;
  };

  const openUpdatePasswordModal = () => {
    if (!updatePasswordModal) return;
    updatePasswordModal.hidden = false;
    if (passwordResult) {
      passwordResult.textContent = "";
    }
    const currentPinInput = document.getElementById("currentPin");
    if (currentPinInput) {
      currentPinInput.focus();
    }
  };

  if (!memberData && openAccountInfoBtn) {
    openAccountInfoBtn.style.display = "none";
  }

  if (!memberData && openUpdatePasswordBtn) {
    openUpdatePasswordBtn.style.display = "none";
  }

  if (openAccountInfoBtn) {
    openAccountInfoBtn.addEventListener("click", () => {
      if (!memberData) {
        return;
      }
      openAccountInfoModal();
    });
  }

  if (openUpdatePasswordBtn) {
    openUpdatePasswordBtn.addEventListener("click", () => {
      if (!memberData) {
        return;
      }
      openUpdatePasswordModal();
    });
  }

  if (accountInfoModal) {
    accountInfoModal.addEventListener("click", (event) => {
      if (event.target && event.target.hasAttribute("data-close")) {
        closeAccountInfoModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !accountInfoModal.hidden) {
        closeAccountInfoModal();
      }
    });
  }

  if (updatePasswordModal) {
    updatePasswordModal.addEventListener("click", (event) => {
      if (event.target && event.target.hasAttribute("data-close")) {
        closeUpdatePasswordModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !updatePasswordModal.hidden) {
        closeUpdatePasswordModal();
      }
    });
  }

  if (updateAccountBtn) {
    updateAccountBtn.addEventListener("click", async () => {
      const phone = document.getElementById("accountPhone").value.trim();
      const email = document.getElementById("accountEmail").value.trim();

      if (!email) {
        accountResult.textContent = "Email address is required.";
        return;
      }

      try {
        const res = await fetch("/api/update-account-info", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            member: memberData,
            phone,
            email
          })
        });

        const data = await res.json();

        if (data.success) {
          accountResult.textContent = data.message || "Account information updated.";

          // keep localStorage in sync
          memberData["Phone Number"] = phone;
          memberData["Email Address"] = email;
          localStorage.setItem("memberData", JSON.stringify(memberData));
        } else {
          accountResult.textContent = data.error || "Could not update account information.";
        }
      } catch (err) {
        accountResult.textContent = "Could not update account information.";
      }
    });
  }

  if (updatePasswordBtn) {
    updatePasswordBtn.addEventListener("click", async () => {
      const currentPin = document.getElementById("currentPin").value.trim();
      const newPin = document.getElementById("newPin").value.trim();
      const confirmPin = document.getElementById("confirmPin").value.trim();

      if (!memberData) {
        passwordResult.textContent = "Please log in again.";
        return;
      }

      if (!currentPin || !newPin || !confirmPin) {
        passwordResult.textContent = "Please fill out all password fields.";
        return;
      }

      if (!/^\d{4}$/.test(newPin)) {
        passwordResult.textContent = "New password must be exactly 4 digits.";
        return;
      }

      if (newPin !== confirmPin) {
        passwordResult.textContent = "New passwords do not match.";
        return;
      }

      const originalLabel = updatePasswordBtn.textContent;
      updatePasswordBtn.disabled = true;
      updatePasswordBtn.textContent = "Updating...";

      try {
        const res = await fetch("/api/update-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            member: memberData,
            currentPin,
            newPin
          })
        });

        const data = await res.json();

        if (data.success) {
          passwordResult.textContent = data.message || "Password updated.";
          document.getElementById("currentPin").value = "";
          document.getElementById("newPin").value = "";
          document.getElementById("confirmPin").value = "";
          setTimeout(() => {
            closeUpdatePasswordModal();
          }, 700);
        } else {
          passwordResult.textContent = data.error || "Could not update password.";
        }
      } catch (err) {
        passwordResult.textContent = "Could not update password.";
      } finally {
        updatePasswordBtn.disabled = false;
        updatePasswordBtn.textContent = originalLabel;
      }
    });
  }
  </script>
  <script>
    (function() {
      if (window.location.pathname.startsWith("/member-dashboard")) return;
      const memberData = localStorage.getItem("memberData");
      if (!memberData) return;
      const loginLink = document.querySelector(".site-menu-login");
      if (!loginLink) return;
      loginLink.textContent = "Dashboard";
      loginLink.setAttribute("href", "/member-dashboard/");
    })();
  </script>
</body>
</html>
